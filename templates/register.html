{% extends "base.html" %}

{% block content %}

<div class="container">

<div class="row justify-content-center">

<div class="col-md-7">

<div class="card shadow mt-5">

<div class="card-body">

<h3 class="text-center mb-4">Register</h3>

<form method="POST">

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<div class="mb-3">
<label>Role</label>
<select name="role" class="form-control" id="role">
<option value="student">Student</option>
<option value="company">Company</option>
</select>
</div>

<hr>

<h5>Student Details</h5>

<div class="mb-2">
<input class="form-control" name="name" placeholder="Full Name">
</div>

<div class="mb-2">
<input class="form-control" name="roll_number" placeholder="Roll Number">
</div>

<div class="mb-2">
<input class="form-control" name="branch" placeholder="Branch">
</div>

<div class="mb-2">
<input class="form-control" name="cgpa" placeholder="CGPA">
</div>

<div class="mb-2">
<input class="form-control" name="phone" placeholder="Phone">
</div>

<hr>

<h5>Company Details</h5>

<div class="mb-2">
<input class="form-control" name="company_name" placeholder="Company Name">
</div>

<div class="mb-2">
<input class="form-control" name="location" placeholder="Location">
</div>

<div class="mb-2">
<input class="form-control" name="website" placeholder="Website">
</div>

<div class="mb-3">
<textarea class="form-control" name="description" placeholder="Company Description"></textarea>
</div>

<button class="btn btn-success w-100">
Register
</button>

</form>

<div class="text-center mt-3">
<a href="{{ url_for('login') }}">Already have an account?</a>
</div>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
