{% extends "base.html" %}

{% block content %}

<h2 style="text-align:center;">Admin Analytics Dashboard</h2>

<div style="width:90%; margin:auto;">

<div style="display:flex; justify-content:space-between; flex-wrap:wrap;">

<!-- Applications per Company -->
<div style="width:48%; background:#f9f9f9; padding:20px; border-radius:8px;">

<h3 style="text-align:center;">Applications per Company</h3>

<canvas id="companyChart" height="220"></canvas>

</div>


<!-- Status Distribution -->
<div style="width:48%; background:#f9f9f9; padding:20px; border-radius:8px;">

<h3 style="text-align:center;">Application Status Distribution</h3>

<canvas id="statusChart" height="220"></canvas>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const companyNames = {{ company_names | tojson }};
const applicationCounts = {{ application_counts | tojson }};

const statuses = {{ statuses | tojson }};
const statusCounts = {{ status_counts | tojson }};


// Company Applications Chart

new Chart(
document.getElementById('companyChart'),
{
type: 'bar',
data: {
labels: companyNames,
datasets: [{
label: 'Applications',
data: applicationCounts,
backgroundColor: 'rgba(54, 162, 235, 0.7)'
}]
},
options: {
responsive: true,
plugins: {
legend: {
display: false
}
},
scales: {
y: {
beginAtZero: true
}
}
}
}
);


// Status Distribution Chart

new Chart(
document.getElementById('statusChart'),
{
type: 'pie',
data: {
labels: statuses,
datasets: [{
data: statusCounts,
backgroundColor: [
'#4CAF50',
'#2196F3',
'#FF9800',
'#F44336',
'#9C27B0'
]
}]
},
options: {
responsive: true,
plugins: {
legend: {
position: 'bottom'
}
}
}
}
);

</script>

{% endblock %}
