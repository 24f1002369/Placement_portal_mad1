{% extends "base.html" %}

{% block content %}

<h4 class="mb-3">Analytics Dashboard</h4>

<div class="row g-3">

<!-- Applications Per Company -->
<div class="col-md-4">
<div class="card shadow-sm">
<div class="card-body p-3">

<h6 class="mb-2">Applications Per Company</h6>

<canvas id="companyChart"></canvas>

</div>
</div>
</div>


<!-- Status Distribution -->
<div class="col-md-4">
<div class="card shadow-sm">
<div class="card-body p-3">

<h6 class="mb-2">Application Status Distribution</h6>

<canvas id="statusChart"></canvas>

</div>
</div>
</div>


<!-- NEW CHART : Placements by Company -->
<div class="col-md-4">
<div class="card shadow-sm">
<div class="card-body p-3">

<h6 class="mb-2">Placements by Company</h6>

<canvas id="placementChart"></canvas>

</div>
</div>
</div>

</div>


<script>

const companyNames = {{ company_names | tojson }};
const applicationCounts = {{ application_counts | tojson }};

const statuses = {{ statuses | tojson }};
const statusCounts = {{ status_counts | tojson }};

const placementCompanies = {{ placement_companies | tojson }};
const placementCounts = {{ placement_counts | tojson }};


/* Applications Per Company */

new Chart(
document.getElementById("companyChart"),
{
type:"bar",
data:{
labels:companyNames,
datasets:[{
data:applicationCounts,
backgroundColor:"#3b82f6"
}]
},
options:{
responsive:true,
maintainAspectRatio:true,
plugins:{legend:{display:false}},
scales:{
y:{
beginAtZero:true,
ticks:{
precision:0,
stepSize:1
}
}
}
}
}
);


/* Status Distribution */

new Chart(
document.getElementById("statusChart"),
{
type:"pie",
data:{
labels:statuses,
datasets:[{
data:statusCounts,
backgroundColor:[
"#3b82f6",
"#10b981",
"#f59e0b",
"#ef4444"
]
}]
},
options:{
responsive:true,
maintainAspectRatio:true
}
}
);


/* Placements by Company */

new Chart(
document.getElementById("placementChart"),
{
type:"bar",
data:{
labels:placementCompanies,
datasets:[{
label:"Students Placed",
data:placementCounts,
backgroundColor:"#8b5cf6"
}]
},
options:{
responsive:true,
maintainAspectRatio:true,
plugins:{legend:{display:false}},
scales:{
y:{
beginAtZero:true,
ticks:{
precision:0,
stepSize:1
}
}
}
}
}
);

</script>

{% endblock %}
