{% extends "base.html" %}

{% block content %}

<h3 class="mb-4">Placed Students</h3>

<div class="table-box">

<table class="table table-striped table-hover">

<thead>
<tr>
<th>Student</th>
<th>Company</th>
<th>Drive</th>
<th>Status</th>
<th>Date</th>
</tr>
</thead>

<tbody>

{% for p in placements %}

<tr>

<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>
<span class="badge bg-success">{{ p[3] }}</span>
</td>
<td>{{ p[4] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
