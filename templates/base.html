<!DOCTYPE html>

<html>
<head>
    <title>{% block title %}Placement Portal{% endblock %}</title>
</head>
<body>

<h1>Placement Portal MAD 1</h1>

<hr>

<!-- Flash Messages -->

{% with messages = get_flashed_messages() %}
{% if messages %} <ul>
{% for message in messages %} <li>{{ message }}</li>
{% endfor %} </ul>
{% endif %}
{% endwith %}

<hr>

{% block content %}
{% endblock %}

</body>
</html>
