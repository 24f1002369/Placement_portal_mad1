<!DOCTYPE html>
<html>
<head>
    <title>Placement Portal</title>
</head>

<body>

<h1>Placement Portal</h1>

{% with messages = get_flashed_messages() %}
  {% if messages %}
      {% for msg in messages %}
        <p style="color:green">{{ msg }}</p>
      {% endfor %}
  {% endif %}
{% endwith %}

<hr>

{% block content %}
{% endblock %}

</body>
</html>
