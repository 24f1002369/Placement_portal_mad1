{% extends "base.html" %}

{% block content %}

<h3 class="mb-4">Applicants</h3>

<div class="table-box">

<table class="table table-striped table-hover">

<thead>

<tr>
<th>Name</th>
<th>Email</th>
<th>Branch</th>
<th>CGPA</th>
<th>Skills</th>
<th>Resume</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

{% for app in applicants %}

<tr>

<td>{{ app[1] }}</td>

<td>{{ app[2] }}</td>

<td>{{ app[3] }}</td>

<td>{{ app[4] }}</td>

<td>{{ app[5] }}</td>

<td>

<a href="{{ url_for('download_resume', filename=app[6]) }}"
class="btn btn-sm btn-secondary">

Download

</a>

</td>

<td>{{ app[7] }}</td>

<td>

<a href="{{ url_for('update_application', app_id=app[0], status='shortlisted') }}"
class="btn btn-warning btn-sm">Shortlist</a>

<a href="{{ url_for('update_application', app_id=app[0], status='selected') }}"
class="btn btn-success btn-sm">Select</a>

<a href="{{ url_for('update_application', app_id=app[0], status='rejected') }}"
class="btn btn-danger btn-sm">Reject</a>

<a href="{{ url_for('update_application', app_id=app[0], status='placed') }}"
class="btn btn-primary btn-sm">Placed</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
