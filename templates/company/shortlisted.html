{% extends "base.html" %}

{% block content %}

<h2>Shortlisted Students</h2>

<table border="1">

<tr>
<th>Name</th>
<th>Email</th>
<th>Branch</th>
<th>CGPA</th>
</tr>

{% for s in students %}

<tr>
<td>{{ s[0] }}</td>
<td>{{ s[1] }}</td>
<td>{{ s[2] }}</td>
<td>{{ s[3] }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
