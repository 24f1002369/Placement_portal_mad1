{% extends "base.html" %}

{% block content %}

<h3 class="mb-4">Shortlisted Students</h3>

<div class="table-box">

<table class="table table-striped table-hover">

<thead>

<tr>
<th>Name</th>
<th>Email</th>
<th>Branch</th>
<th>CGPA</th>
</tr>

</thead>

<tbody>

{% for student in students %}

<tr>

<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>
<td>{{ student[3] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
