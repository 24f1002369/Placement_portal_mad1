{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

<h3 class="mb-4">Student Dashboard</h3>

<div class="row">

<div class="col-md-4">
<div class="card card-hover shadow-sm">
<div class="card-body text-center">
<i class="bi bi-person-circle display-4 text-primary"></i>
<h5 class="mt-3">Update Profile</h5>
<p>Keep your details and resume updated.</p>
<a href="{{ url_for('student_profile') }}" class="btn btn-primary btn-sm">Go to Profile</a>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card card-hover shadow-sm">
<div class="card-body text-center">
<i class="bi bi-briefcase display-4 text-success"></i>
<h5 class="mt-3">Browse Drives</h5>
<p>View placement drives matching your CGPA.</p>
<a href="{{ url_for('student_drives') }}" class="btn btn-success btn-sm">View Drives</a>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card card-hover shadow-sm">
<div class="card-body text-center">
<i class="bi bi-file-earmark-text display-4 text-warning"></i>
<h5 class="mt-3">Applications</h5>
<p>Track your placement applications.</p>
<a href="{{ url_for('student_applications') }}" class="btn btn-warning btn-sm">View Applications</a>
</div>
</div>
</div>

</div>

</div>

{% endblock %}
