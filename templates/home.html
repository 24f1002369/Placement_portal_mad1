{% extends "base.html" %}

{% block content %}

<style>

.home-container{
min-height:85vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* Glass card behind text */

.home-card{
background:rgba(0,0,0,0.35);
padding:40px 60px;
border-radius:16px;
backdrop-filter:blur(6px);
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

/* App icon */

.app-logo{
width:90px;
height:90px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

/* Title */

.app-title{
font-weight:700;
font-size:42px;
color:white;
text-shadow:0 2px 6px rgba(0,0,0,0.4);
}

/* Subtitle */

.app-subtitle{
color:#e2e8f0;
margin-top:8px;
margin-bottom:30px;
font-size:16px;
}

/* Buttons */

.home-buttons .btn{
padding:10px 28px;
font-weight:500;
}

</style>


<div class="home-container">

<div class="home-card">

<img 
src="{{ url_for('static', filename='icons/favicon.svg') }}" 
class="app-logo">

<div class="app-title">
PlaceLink
</div>

<div class="app-subtitle">
Smart Campus Placement Management System
</div>

<div class="home-buttons">

<a href="{{ url_for('login') }}" class="btn btn-primary me-2">
Login
</a>

<a href="{{ url_for('register') }}" class="btn btn-outline-light">
Register
</a>

</div>

</div>

</div>

{% endblock %}
